<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Quote Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>Sales Quote Calculator</h1>
      <p>Web version of your quoting tool</p>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Quote Inputs</h2>

        <div class="field">
          <label for="quantity">Quantity</label>
          <input id="quantity" type="number" min="1" step="1" placeholder="Enter quantity" />
        </div>

        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="">Select Category</option>
          </select>
        </div>

        <div class="field">
          <label for="paperFormat">Paper Format</label>
          <select id="paperFormat" disabled>
            <option value="">Select Paper Format</option>
          </select>
        </div>

        <div class="field">
          <label for="productType">Product Type</label>
          <select id="productType" disabled>
            <option value="">Select Product Type</option>
          </select>
        </div>

        <div class="field">
          <label>Auto Envelope</label>
          <div id="autoEnvelope" class="readonly">Select Category and Paper Format</div>
        </div>

        <div class="field">
          <label for="dataList">Data List</label>
          <select id="dataList" disabled>
            <option value="">Skip</option>
          </select>
        </div>

        <div class="field">
          <label for="colorOption">Simplex / Duplex Color</label>
          <select id="colorOption" disabled>
            <option value="">Skip</option>
          </select>
        </div>

        <div class="field">
          <label>Fixed Charges</label>
          <div id="fixedCharges" class="checkbox-grid muted">
            Select Category first
          </div>
        </div>

        <div id="aiVideoSection" class="card nested hidden">
          <h3>BlueInk AI Options</h3>

          <label class="checkbox-row">
            <input type="checkbox" id="addAiVideo" />
            <span>Add AI Video</span>
          </label>

          <label class="checkbox-row">
            <input type="checkbox" id="addCustomAiLikenessVideo" />
            <span>Add Custom AI Likeness Video ($600 flat)</span>
          </label>
        </div>

        <div class="actions">
          <button id="calculateBtn" type="button">Calculate Cost</button>
        </div>
      </section>

      <section class="card">
        <h2>Results</h2>

        <div>
          <strong>Status:</strong> <span id="status">Waiting</span><br/>
          <strong>Cost Per Piece:</strong> <span id="costPerPiece">$0.0000</span><br/>
          <strong>Total Cost:</strong> <span id="totalCost">$0.0000</span>
        </div>

        <div>
          <h3>Notes</h3>
          <div id="notes">No notes yet.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
